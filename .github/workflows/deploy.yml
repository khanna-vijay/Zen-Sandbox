# Build the v2 MkDocs site (github-pages-v2/) and deploy it to GitHub Pages.
#
# Only workflows in the REPO ROOT .github/workflows/ run, so the v1 workflow
# under github-pages/.github/ is ignored — this is the single active deploy.
#
# Security: least-privilege token (only what Pages needs), official OIDC-based
# deploy (no stored secrets), pinned actions, reproducible pinned deps, strict build.

name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: github-pages-v2
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Enables GitHub Pages (source = GitHub Actions) on the first run,
      # so no manual Settings → Pages step is needed.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: github-pages-v2/requirements.txt

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Build site (strict — fails on broken links)
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: github-pages-v2/site   # path is relative to repo root

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
