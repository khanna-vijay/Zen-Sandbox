# AUTO-GENERATED by pipeline/publish.py — do not hand-edit; re-run the publisher.
site_name: The Improv Framework
site_description: The complete improv mastery framework — domains, principles, skills, techniques.
site_url: https://khanna-vijay.github.io/Zen-Sandbox/
repo_url: https://github.com/khanna-vijay/Zen-Sandbox
repo_name: khanna-vijay/Zen-Sandbox · v3
copyright: "The Improv Framework — v3"

docs_dir: docs
strict: true

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle: { icon: material/weather-sunny, name: Light mode }
  icon:
    logo: material/drama-masks

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/keynav.js

plugins:
  - search
  - glightbox:
      zoomable: true
      draggable: true
      auto_caption: false
      effect: zoom
  - print-site:
      add_to_navigation: true
      print_page_title: "Read as one page"
      add_print_site_banner: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc: { permalink: true }
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

