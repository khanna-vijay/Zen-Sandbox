<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Improv Mastery — Concentric Mind Map</title>
<style>
  :root{
    --plane:#f9f9f7; --surface:#fcfcfb;
    --ink:#0b0b0b; --ink-2:#52514e; --muted:#898781;
    --grid:#e1e0d9; --border:rgba(11,11,11,.10);
    --hub:#d1541f; --hub-ink:#ffffff;
    --d1:#2a78d6; --d2:#1baf7a; --d3:#eda100; --d4:#008300; --d5:#4a3aa7;
    --shadow:0 1px 3px rgba(11,11,11,.08),0 8px 30px rgba(11,11,11,.06);
  }
  @media (prefers-color-scheme:dark){
    :root{
      --plane:#0d0d0d; --surface:#1a1a19;
      --ink:#ffffff; --ink-2:#c3c2b7; --muted:#898781;
      --grid:#2c2c2a; --border:rgba(255,255,255,.10);
      --hub:#eb6834; --hub-ink:#1a1a19;
      --d1:#3987e5; --d2:#199e70; --d3:#c98500; --d4:#008300; --d5:#9085e9;
      --shadow:0 1px 3px rgba(0,0,0,.5),0 8px 30px rgba(0,0,0,.4);
    }
  }
  body.force-light{--plane:#f9f9f7;--surface:#fcfcfb;--ink:#0b0b0b;--ink-2:#52514e;--muted:#898781;
    --grid:#e1e0d9;--border:rgba(11,11,11,.10);--hub:#d1541f;--hub-ink:#fff;
    --d1:#2a78d6;--d2:#1baf7a;--d3:#eda100;--d4:#008300;--d5:#4a3aa7;}
  body.force-dark{--plane:#0d0d0d;--surface:#1a1a19;--ink:#fff;--ink-2:#c3c2b7;--muted:#898781;
    --grid:#2c2c2a;--border:rgba(255,255,255,.10);--hub:#eb6834;--hub-ink:#1a1a19;
    --d1:#3987e5;--d2:#199e70;--d3:#c98500;--d4:#008300;--d5:#9085e9;}

  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{background:var(--plane); color:var(--ink); display:flex; flex-direction:column;
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; -webkit-font-smoothing:antialiased;}
  .toolbar{display:flex; gap:.5rem; align-items:center; flex-wrap:wrap;
    padding:.55rem .9rem; background:var(--surface); border-bottom:1px solid var(--border); box-shadow:var(--shadow);}
  .toolbar .title{font-weight:800; font-size:1rem; margin-right:auto; letter-spacing:.2px}
  .toolbar .title small{color:var(--ink-2); font-weight:500}
  button.tb{font:inherit; font-size:.85rem; font-weight:600; cursor:pointer; color:var(--ink);
    background:var(--plane); border:1px solid var(--border); border-radius:.55rem; padding:.42rem .7rem;}
  button.tb:hover{filter:brightness(1.05); background:var(--surface)}
  .stage-wrap{flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:10px}
  .stage{width:min(96vw, 86vh); aspect-ratio:1/1; background:var(--surface);
    border:1px solid var(--border); border-radius:14px; box-shadow:var(--shadow); overflow:hidden;}
  svg{width:100%; height:100%; display:block; font-family:inherit}
  .brick{stroke:var(--surface); stroke-width:2;}
  .faded{opacity:.14}
  .tooltip{position:fixed; pointer-events:none; z-index:20; max-width:280px; background:var(--surface); color:var(--ink);
    border:1px solid var(--border); border-radius:.55rem; box-shadow:var(--shadow); padding:.55rem .7rem;
    font-size:.82rem; line-height:1.35; opacity:0; transition:opacity .12s;}
  .tooltip .tt-code{color:var(--muted); font-size:.72rem; font-weight:700; letter-spacing:.4px}
  .tooltip .tt-name{font-weight:700; margin:.1rem 0 .15rem}
  .tooltip .tt-kind{display:inline-block; font-size:.68rem; font-weight:700; text-transform:uppercase;
    letter-spacing:.5px; padding:.05rem .35rem; border-radius:.35rem; color:#fff}
  @media print{
    @page{ size:A3 landscape; margin:8mm; }
    .toolbar{display:none !important}
    body,body.force-dark{background:#fff;--plane:#fff;--surface:#fff;--ink:#0b0b0b;--ink-2:#52514e;
      --grid:#e1e0d9;--border:rgba(11,11,11,.12);--hub:#d1541f;--hub-ink:#fff;
      --d1:#2a78d6;--d2:#1baf7a;--d3:#eda100;--d4:#008300;--d5:#4a3aa7;}
    .stage-wrap{padding:0} .stage{width:min(100%,190mm); border:none; box-shadow:none; border-radius:0}
  }
</style>
</head>
<body>
  <div class="toolbar">
    <div class="title">🎭 Improv Mastery — Concentric Mind Map
      <small>&nbsp;Domains · Principles · Skills</small></div>
    <button class="tb" id="btnTheme" title="Toggle light / dark">◐ Theme</button>
    <button class="tb" id="btnPNG" title="Download a PNG image">⬇ PNG</button>
    <button class="tb" id="btnPrint" title="Print / Save as PDF at A3 landscape">🖨 A3 / PDF</button>
  </div>
  <div class="stage-wrap"><div class="stage">
    <svg id="map" viewBox="0 0 1160 1160" preserveAspectRatio="xMidYMid meet" role="img"
      aria-label="Concentric mind map of the Improv Mastery Framework"></svg>
  </div></div>
  <div class="tooltip" id="tip"></div>

<script src="assets/mindmap-data.js"></script>
<script>
const DOMAINS = window.IMPROV_DOMAINS;
const DOMVAR = ["--d1","--d2","--d3","--d4","--d5"];
const SVG=document.getElementById("map"), NS="http://www.w3.org/2000/svg";
const CX=580, CY=580;
const BANDS={ hub:70, dom:[78,180], prin:[188,338], skill:[346,552] };
const DGAP=2.6*Math.PI/180, BGAP=0.9*Math.PI/180, RPAD=5;

function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
function cssv(v){return getComputedStyle(document.body).getPropertyValue(v).trim();}
function polar(r,a){return [r*Math.sin(a), -r*Math.cos(a)];}
function hex2rgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
function rgb2hex(r){return '#'+r.map(x=>Math.round(x).toString(16).padStart(2,'0')).join('');}
function mix(a,b,t){const A=hex2rgb(a),B=hex2rgb(b);return rgb2hex(A.map((x,i)=>x+(B[i]-x)*t));}
function lum(hex){const[r,g,b]=hex2rgb(hex).map(v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);});
  return .2126*r+.7152*g+.0722*b;}
function inkOn(hex){return lum(hex)>0.42 ? '#111' : '#fff';}

function sector(r0,r1,a0,a1){
  const large=(a1-a0)>Math.PI?1:0;
  const [x0o,y0o]=polar(r1,a0),[x1o,y1o]=polar(r1,a1);
  const [x1i,y1i]=polar(r0,a1),[x0i,y0i]=polar(r0,a0);
  return `M${x0o},${y0o} A${r1},${r1} 0 ${large} 1 ${x1o},${y1o}`
       + ` L${x1i},${y1i} A${r0},${r0} 0 ${large} 0 ${x0i},${y0i} Z`;
}
function fitText(str, boxW, boxH, maxFont){
  const words=str.split(/\s+/), longest=Math.max(...words.map(w=>w.length));
  for(let fs=maxFont; fs>=6.5; fs-=0.5){
    const charW=fs*0.56, lineH=fs*1.16;
    if(longest*charW>boxW) continue;
    const lines=wrap(words,Math.max(1,Math.floor(boxW/charW)));
    if(lines.length*lineH<=boxH) return {fs,lines,lineH};
  }
  const fs=6.5,charW=fs*0.56,lineH=fs*1.16;
  return {fs,lines:wrap(words,Math.max(1,Math.floor(boxW/charW))),lineH};
}
function wrap(words,maxChars){const lines=[];let cur='';
  for(const w of words){const t=cur?cur+' '+w:w; if(t.length<=maxChars)cur=t; else{if(cur)lines.push(cur);cur=w;}}
  if(cur)lines.push(cur); return lines;}

let NODES=[];
function render(){
  while(SVG.firstChild)SVG.removeChild(SVG.firstChild);
  NODES=[];
  const g=el("g",{transform:`translate(${CX},${CY})`}); SVG.appendChild(g);
  const surface=cssv("--surface");

  DOMAINS.forEach((d,di)=>{
    const color=cssv(DOMVAR[di]);
    const center=di*(2*Math.PI/5), half=(2*Math.PI/5 - DGAP)/2;
    const dStart=center-half, dEnd=center+half;
    addBrick(g,{r0:BANDS.dom[0],r1:BANDS.dom[1],a0:dStart,a1:dEnd,
      fill:color, ink:inkOn(color), fs:20, kind:"dom", code:d.code, name:d.name, desc:d.desc, di});
    const pFill=mix(color,surface,0.80), pInk=cssv("--ink"), nP=d.principles.length, pArc=(dEnd-dStart)/nP;
    d.principles.forEach((p,i)=>addBrick(g,{r0:BANDS.prin[0],r1:BANDS.prin[1],
      a0:dStart+i*pArc+BGAP/2,a1:dStart+(i+1)*pArc-BGAP/2,
      fill:pFill, ink:pInk, fs:13, kind:"prin", code:p.code, name:p.name, desc:p.desc, di}));
    const sFill=mix(color,surface,0.52), sInk=inkOn(sFill), nS=d.skills.length, sArc=(dEnd-dStart)/nS;
    d.skills.forEach((s,i)=>addBrick(g,{r0:BANDS.skill[0],r1:BANDS.skill[1],
      a0:dStart+i*sArc+BGAP/2,a1:dStart+(i+1)*sArc-BGAP/2,
      fill:sFill, ink:sInk, fs:13, kind:"skill", code:s.code, name:s.name,
      desc:s.descShort||("Skill — trains "+s.techniques.length+" techniques."), di}));
  });

  const hub=el("g",{}); g.appendChild(hub);
  hub.appendChild(el("circle",{r:BANDS.hub-6,fill:cssv("--hub")}));
  const hi=cssv("--hub-ink");
  [["IMPROV",-8,17,800],["MASTERY",13,17,800],["Layer 0 · Safety",31,10,500]].forEach(([t,y,fs,w])=>{
    const e=el("text",{"text-anchor":"middle",y,fill:hi,"font-size":fs,"font-weight":w,"font-family":"inherit"});
    e.textContent=t; if(t==="Layer 0 · Safety")e.setAttribute("opacity",".85"); hub.appendChild(e);});

  drawLegend();
}

function addBrick(g,o){
  const r0=o.r0+RPAD/2, r1=o.r1-RPAD/2, a0=o.a0, a1=o.a1;
  const grp=el("g",{}); g.appendChild(grp);
  grp.appendChild(el("path",{class:"brick",d:sector(r0,r1,a0,a1),fill:o.fill}));
  const rMid=(r0+r1)/2, aMid=(a0+a1)/2;
  const tang=(a1-a0)*rMid, radial=(r1-r0);
  const c=Math.abs(Math.cos(aMid)), s=Math.abs(Math.sin(aMid));
  const boxW=0.72*(tang*c + radial*s), boxH=0.72*(tang*s + radial*c);
  const {fs,lines,lineH}=fitText(o.name, Math.max(boxW,14), Math.max(boxH,12), o.fs);
  const [tx,ty]=polar(rMid,aMid);
  const t=el("text",{"text-anchor":"middle","font-family":"inherit","font-size":fs,fill:o.ink,
    "font-weight":o.kind==="dom"?800:o.kind==="skill"?700:600,
    "font-style":o.kind==="prin"?"italic":"normal"});
  const y0=ty-(lines.length-1)*lineH/2;
  lines.forEach((ln,i)=>{const ts=el("tspan",{x:tx,y:y0+i*lineH});ts.textContent=ln;t.appendChild(ts);});
  grp.appendChild(t);
  grp.style.cursor="pointer";
  NODES.push({grp,di:o.di});
  const rec={code:o.code,name:o.name,desc:o.desc,kind:o.kind,color:cssv(DOMVAR[o.di])};
  grp.addEventListener("mouseenter",e=>hover(rec,o.di,true,e));
  grp.addEventListener("mousemove",moveTip);
  grp.addEventListener("mouseleave",()=>hover(rec,o.di,false));
}

const KIND={dom:"Domain",prin:"Principle · Why",skill:"Skill · What"};
function hover(rec,di,on,e){
  const tip=document.getElementById("tip");
  NODES.forEach(n=>n.grp.classList.toggle("faded", on && n.di!==di));
  if(on){
    tip.innerHTML=`<span class="tt-kind" style="background:${rec.color}">${KIND[rec.kind]}</span>
      <div class="tt-code">${rec.code}</div><div class="tt-name">${rec.name}</div><div>${rec.desc||""}</div>`;
    tip.style.opacity="1"; moveTip(e);
  } else tip.style.opacity="0";
}
function moveTip(e){const tip=document.getElementById("tip");const pad=14;
  let x=e.clientX+pad,y=e.clientY+pad;const r=tip.getBoundingClientRect();
  if(x+r.width>innerWidth)x=e.clientX-r.width-pad; if(y+r.height>innerHeight)y=e.clientY-r.height-pad;
  tip.style.left=x+"px"; tip.style.top=y+"px";}

function drawLegend(){
  const ink=cssv("--ink"), ink2=cssv("--ink-2"), surface=cssv("--surface");
  const gL=el("g",{transform:"translate(24,26)"}); SVG.appendChild(gL);
  const tt=el("text",{x:0,y:0,"font-size":14,"font-weight":800,fill:ink,"font-family":"inherit"});
  tt.textContent="Rings (inner → outer)"; gL.appendChild(tt);
  [["Domain",cssv("--d1")],["Principle · Why",mix(cssv("--d1"),surface,0.80)],["Skill · What",mix(cssv("--d1"),surface,0.52)]]
    .forEach((L,i)=>{const y=18+i*19,row=el("g",{transform:`translate(2,${y})`});gL.appendChild(row);
      row.appendChild(el("rect",{x:-2,y:-9,width:16,height:12,rx:2,fill:L[1],stroke:surface,"stroke-width":1}));
      const tx=el("text",{x:22,y:1,"font-size":12,fill:ink2,"font-family":"inherit"});tx.textContent=L[0];row.appendChild(tx);});
  const gR=el("g",{transform:"translate(980,26)"}); SVG.appendChild(gR);
  const t2=el("text",{x:0,y:0,"font-size":14,"font-weight":800,fill:ink,"font-family":"inherit"});
  t2.textContent="Domains"; gR.appendChild(t2);
  DOMAINS.forEach((d,i)=>{const y=18+i*19,row=el("g",{transform:`translate(2,${y})`});gR.appendChild(row);
    row.appendChild(el("circle",{cx:4,cy:-3,r:6,fill:cssv(DOMVAR[i])}));
    const tx=el("text",{x:18,y:1,"font-size":12,fill:ink2,"font-family":"inherit"});tx.textContent=(i+1)+". "+d.name;row.appendChild(tx);});
  const fn=el("text",{x:24,y:1144,"font-size":11,fill:cssv("--muted"),"font-family":"inherit"});
  fn.textContent="Learn bottom-up (Skill → Principle) · Perform top-down (Principle → Skill).";
  SVG.appendChild(fn);
}

document.getElementById("btnTheme").addEventListener("click",()=>{const b=document.body;
  if(b.classList.contains("force-dark")){b.classList.remove("force-dark");b.classList.add("force-light");}
  else if(b.classList.contains("force-light")){b.classList.remove("force-light");}
  else b.classList.add("force-dark"); render();});
document.getElementById("btnPrint").addEventListener("click",()=>window.print());
document.getElementById("btnPNG").addEventListener("click",exportPNG);
function exportPNG(){
  const clone=SVG.cloneNode(true); clone.setAttribute("xmlns",NS);
  clone.setAttribute("width",1160); clone.setAttribute("height",1160);
  const st=document.createElementNS(NS,"style");
  st.textContent=`text{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;} .brick{stroke:${cssv('--surface')};stroke-width:2;}`;
  clone.insertBefore(st,clone.firstChild);
  clone.insertBefore(el("rect",{x:0,y:0,width:1160,height:1160,fill:cssv("--surface")}),clone.firstChild);
  const xml=new XMLSerializer().serializeToString(clone);
  const img=new Image();
  img.onload=()=>{const scale=2.4,c=document.createElement("canvas");c.width=1160*scale;c.height=1160*scale;
    const ctx=c.getContext("2d");ctx.scale(scale,scale);ctx.drawImage(img,0,0);
    c.toBlob(b=>{const a=document.createElement("a");a.href=URL.createObjectURL(b);
      a.download="improv-mind-map.png";a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000);},"image/png");};
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(xml);
}
render();
</script>
</body>
</html>
