# AUTO-GENERATED by pipeline/publish.py — do not hand-edit; re-run the publisher.
site_name: An Improv Framework
site_description: A complete improv mastery framework — domains, principles, skills, techniques.
site_url: https://khanna-vijay.github.io/Zen-Sandbox/
repo_url: https://github.com/khanna-vijay/Zen-Sandbox
repo_name: khanna-vijay/Zen-Sandbox · v3
copyright: >-
  An Improv Framework — v3 ·
  <a href="#__consent">Cookie settings</a>

extra:
  generator: false        # remove the "Made with Material for MkDocs" footer notice
  analytics:
    provider: google
    # GA4 measurement ID injected at build time from the GA_KEY env var (set as a
    # GitHub Actions repo variable → deploy.yml). Empty locally ⇒ analytics simply
    # omitted (Material skips it when property is blank), so local builds stay clean.
    property: !ENV [GA_KEY, ""]
  # Cookie-consent banner. With analytics configured above, Material gates the
  # Google Analytics cookies behind this consent — nothing is set until the
  # visitor accepts (and "reject" keeps GA off). Change/withdraw via the footer link.
  consent:
    title: 🍪 Cookies on Zen Sandbox
    description: >-
      We use Google Analytics cookies to understand which pages help visitors
      most, so we can improve the site. No analytics cookies are set until you
      accept — and you can change or withdraw your choice anytime via
      “Cookie settings” in the footer.
    actions:
      - accept
      - reject
      - manage

docs_dir: docs
strict: true
not_in_nav: |
  games/D*.md
  community-guidelines.md
  improv-synopsis.md
# Previous framework kept in the repo for reference but not published to the site.
exclude_docs: |
  improv-maturity-framework_old.md

theme:
  name: material
  language: en
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.top
    - navigation.instant
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - toc.integrate          # page section headers appear in the LEFT nav (navigable long docs)
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle: { icon: material/weather-night, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle: { icon: material/weather-sunny, name: Light mode }
  icon:
    logo: material/drama-masks

extra_css:
  - assets/extra.css

extra_javascript:
  - assets/keynav.js
  - assets/games-filter.js
  - assets/games-page.js
  - assets/nav-resize.js
  - assets/header-onerow.js

plugins:
  - search
  - glightbox:
      zoomable: true
      draggable: true
      auto_caption: false
      effect: zoom

markdown_extensions:
  - admonition
  - pymdownx.details        # enables collapsible "???"/"???+" admonitions (Backup-games blocks)
  - attr_list
  - md_in_html
  - tables
  - toc: { permalink: true, toc_depth: 2 }
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

